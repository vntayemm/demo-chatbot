<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Chatbot Tester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="./shared-styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app" class="container py-4 py-md-5">
      <h1>CRM Frontend Tester</h1>
      <p class="text-secondary">API base: {{ apiBase }}</p>
      <div class="row g-3">
        <div class="col-12 col-lg-6">
          <crm-chat-bot :api-base="apiBase"></crm-chat-bot>
        </div>
        <div class="col-12 col-lg-6">
          <crm-guidline-bot :api-base="apiBase"></crm-guidline-bot>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./shared-layout.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
