site_name: Demo-Chatbot Docs Library (VI-EN)
site_description: Thu vien tai lieu demo-chatbot (VI-EN)
site_url: https://vntayemm.github.io/demo-chatbot/
repo_name: demo-chatbot
repo_url: https://github.com/vntayemm/demo-chatbot

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - md_in_html

nav:
  - Trang chu | Home: index.md
  - Danh muc | Catalog: catalog.md
  - Lo trinh theo vai tro | Role Roadmap (VI): roadmap.md
  - Lo trinh theo vai tro | Role Roadmap (VI-EN): roadmap_bilingual.md
  - Huong dan publish | Publish Guide: publish_github_pages.md
