site_name: Demo-Chatbot Docs Library (VI-EN)
site_description: Thu vien tai lieu demo-chatbot (VI-EN)
site_url: https://vntayemm.github.io/demo-chatbot/
repo_name: demo-chatbot
repo_url: https://github.com/vntayemm/demo-chatbot

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - md_in_html

validation:
  nav:
    omitted_files: ignore

nav:
  - Trang chu | Home: index.md
  - Danh muc | Catalog: catalog.md
  - Lo trinh theo vai tro | Role Roadmap (VI): roadmap.md
  - Lo trinh theo vai tro | Role Roadmap (VI-EN): roadmap_bilingual.md
  - Noi dung | Content:
      - 01 Overview: content/01-overview/index.md
      - 02 Governance: content/02-governance/index.md
      - 03 Signoff: content/03-signoff/index.md
      - 04 Architecture: content/04-architecture/index.md
      - 05 Execution: content/05-execution/index.md
      - 06 Commercial Legal: content/06-commercial-legal/index.md
      - 07 Sales Profile: content/07-sales-profile/index.md
      - 08 Marketing: content/08-marketing/index.md
      - 99 Other: content/99-other/index.md
  - Huong dan publish | Publish Guide: publish_github_pages.md
