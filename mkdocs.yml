site_name: Demo-Chatbot Docs Library (VI-EN)
site_description: Thu vien tai lieu demo-chatbot (VI-EN)
site_url: https://vntayemm.github.io/demo-chatbot/
repo_name: demo-chatbot
repo_url: https://github.com/vntayemm/demo-chatbot

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html

validation:
  nav:
    omitted_files: ignore

plugins:
  - search
  - awesome-pages

extra_css:
  - stylesheets/page-actions.css
  - stylesheets/mermaid-toolbar.css

extra_javascript:
  - javascripts/page-actions.js
  - javascripts/mermaid-toolbar.js

nav:
  - Trang chu | Home: index.md
  - Danh muc | Catalog: catalog.md
  - Lo trinh theo vai tro | Role Roadmap (VI): roadmap.md
  - Lo trinh theo vai tro | Role Roadmap (VI-EN): roadmap_bilingual.md
  - Noi dung | Content:
      - 01 Overview: content/01-overview
      - 02 Governance: content/02-governance
      - 03 Signoff: content/03-signoff
      - 04 Architecture: content/04-architecture
      - 05 Execution: content/05-execution
      - 06 Commercial Legal: content/06-commercial-legal
      - 07 Sales Profile: content/07-sales-profile
      - 08 Marketing: content/08-marketing
      - 99 Other: content/99-other
  - Huong dan publish | Publish Guide: publish_github_pages.md
