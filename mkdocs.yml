site_name: Demo-Chatbot Docs Library
site_description: Tai lieu du an demo-chatbot
site_url: https://example.github.io/demo-chatbot/
repo_name: demo-chatbot
repo_url: https://github.com/example/demo-chatbot

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Catalog: catalog.md
  - Publish Guide: publish_github_pages.md
