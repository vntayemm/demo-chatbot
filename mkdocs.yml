site_name: "Enterprise Chatbot | AI — Docs Library"
site_description: Thu vien tai lieu Enterprise Chatbot | AI (MkDocs)
site_url: https://vntayemm.github.io/demo-chatbot/
repo_name: "Enterprise Chatbot | AI"
repo_url: https://github.com/vntayemm/demo-chatbot

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  # Light / dark: icon in header toggles between schemes (persisted in localStorage)
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Task lists: use "- [ ]" / "- [x]" list syntax (GFM-style). Place after superfences per Material guidance.
  - pymdownx.tasklist:
      custom_checkbox: true
      # Removes disabled="" so boxes toggle in the browser; state is not saved after reload unless you add custom JS.
      clickable_checkbox: true
  - attr_list
  - md_in_html

validation:
  nav:
    omitted_files: ignore

plugins:
  - search
  - awesome-pages

extra_css:
  - stylesheets/page-actions.css
  - stylesheets/mermaid-toolbar.css

extra_javascript:
  - javascripts/page-actions.js
  - javascripts/mermaid-toolbar.js

nav:
  - Home page: index.md
  - Danh muc | Catalog: catalog.md
  - Lo trinh theo vai tro | Role Roadmap: roadmap.md
  - Lo trinh theo vai tro | Role Roadmap bilingual: roadmap_bilingual.md
  - Noi dung | Content:
      - 01 Overview: content/01-overview
      - 02 Governance: content/02-governance
      - 03 Signoff: content/03-signoff
      - 04 Architecture: content/04-architecture
      - 05 Execution: content/05-execution
      - 06 Commercial Legal: content/06-commercial-legal
      - 07 Sales Profile: content/07-sales-profile
      - 08 Marketing: content/08-marketing
      - 99 Other: content/99-other
  - Huong dan publish | Publish Guide: publish_github_pages.md
